start:
  name: Start effect
  description: Start an animated dynamic scene on a Hue room or zone.
  fields:
    effect:
      name: Effect
      required: true
      selector:
        select:
          options:
            - fireplace
            - ocean
            - aurora
            - sunset
            - sunrise
            - forest
            - candlelight
            - thunderstorm
            - lava
            - party
            - zen
            - volcano_flow
            - meteor_shower
            - refreshing_rain
            - beach_evening
            - in_venice
            - dusky_road
    group:
      name: Room or zone
      description: Name of the Hue room or zone (as in the Hue app).
      required: true
      example: Living Room
      selector:
        text:
    speed:
      name: Speed
      description: Animation speed override (0–1). Defaults per effect.
      selector:
        number:
          min: 0
          max: 1
          step: 0.05
    brightness:
      name: Brightness
      description: Overall brightness (1–100). Defaults per effect.
      selector:
        number:
          min: 1
          max: 100

start_stream:
  name: Start streaming effect
  description: >-
    Start a spatial streaming effect (Hue Entertainment, 25 fps). Uses the
    entertainment area's light positions. First use requires pressing the
    bridge's link button once to register a streaming key.
  fields:
    effect:
      name: Effect
      required: true
      selector:
        select:
          options:
            - fireplace
            - ocean
            - aurora
            - thunderstorm
            - meteor_shower
            - lava
            - volcano_flow
            - refreshing_rain
            - swirl
            - breathing
            - candle
    area:
      name: Entertainment area
      description: Name of the entertainment area. Defaults to the first one.
      example: Surround
      selector:
        text:
    brightness:
      name: Brightness
      description: Overall intensity (1–150, default 100).
      selector:
        number:
          min: 1
          max: 150
    immersive:
      name: Immersive
      description: >-
        Full immersion: near-field (couch) lights become full scene
        participants — flames, lightning and droplets at full intensity.
        Off = cozy mode (couch lights stay soft and smooth).
      selector:
        boolean:
    companions:
      name: Companion lights
      description: >-
        Non-Hue HA lights that join the effect at a slow update rate
        (~1.5s, for BLE/HomeKit lights). List of {entity_id, x, y, z}
        using entertainment-space coordinates.
      example: "[{entity_id: light.ball, x: 0.98, y: 0.99, z: -1.0}]"
      selector:
        object:

stop_stream:
  name: Stop streaming effect
  description: Stop the streaming effect and release the entertainment slot.

stop:
  name: Stop effect
  description: Stop the animation on a Hue room or zone.
  fields:
    group:
      name: Room or zone
      required: true
      example: Living Room
      selector:
        text:
    turn_off:
      name: Turn off
      description: Turn the lights off instead of freezing to warm white.
      selector:
        boolean:
